name: Tests automatizados

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pytest pytest-html

      - name: Ejecutar tests
        run: pytest test/ -v --html=reporte.html --self-contained-html

      - name: Subir reporte HTML
        uses: actions/upload-artifact@v3
        with:
          name: reporte-tests
          path: reporte.html
